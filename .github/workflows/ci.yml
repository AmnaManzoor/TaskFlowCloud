name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TaskFlow.slnx

      - name: Build
        run: dotnet build TaskFlow.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test TaskFlow.slnx --configuration Release --no-build --verbosity normal
