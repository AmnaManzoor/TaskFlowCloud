name: Bug Report
description: Report incorrect or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. POST /api/auth/login with ...
        2. GET /api/tasks/...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: .NET / TaskFlow Version
      placeholder: e.g. .NET 10, commit abc123
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Include correlation ID from Problem Details if available
