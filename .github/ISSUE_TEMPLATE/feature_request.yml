name: Feature Request
description: Suggest an enhancement (note — core repo may scope features separately)
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: checkboxes
    id: architecture
    attributes:
      label: Architecture Impact
      options:
        - label: Requires new migration
        - label: Affects authorization model
        - label: Cross-cutting (logging, notifications, audit)
